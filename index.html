<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <button command="show-modal" commandfor="add-new-book">
        Add New Book
      </button>
      <dialog closedby="any" id="add-new-book">
        <form method="dialog" autofocus>
          <fieldset>
            <legend>Add New Book</legend>
            <label for="title">Title:</label>
            <input type="text" name="title" id="title" /><br /><br />

            <label for="author">Author:</label>
            <input type="text" name="author" id="author" /><br /><br />

            <label for="pages">Pages:</label>
            <input type="text" name="pages" id="pages" /><br /><br />

            <!-- <label for="read">Read:</label>
            <input type="text" name="read" id="read" /> -->

             <label for="read-select">Finished?</label>
            <select id="read-select">
              <option value="Read">Read</option>
              <option value="Not Read">Not Read</option>
            </select>
            
            <br /><br />
            <button id="submit" type="submit">Confirm Details</button>
          </fieldset>
        </form>
      </dialog>
      <div class="container"></div>
    </main>
  </body>
</html>
